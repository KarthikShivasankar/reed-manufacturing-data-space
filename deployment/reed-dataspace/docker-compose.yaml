#
# REED Dataspace - shared infrastructure for a two-participant local dataspace.
#
#   * postgres        : one server, two databases (reed_supplier, reed_oem) so each
#                       REED participant has its own isolated metadata store.
#   * pgadmin         : browse the databases at http://localhost:5051
#   * keycloak        : OPTIONAL identity provider for the "secured" path; only
#                       started with `--profile secured`.
#
# The two REED backends + frontends run from source (see scripts/) so you can use
# the code you just built. Ports are chosen to avoid clashing with the existing
# deployment/local/docker-compose stack (5432, 8080, 5050).

name: reed-dataspace

services:
  postgres:
    image: postgres:16
    container_name: reed_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reed
      POSTGRES_PASSWORD: reed
      POSTGRES_DB: reed
    ports:
      - "5433:5432"
    volumes:
      - reed_pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reed"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [reed-net]

  pgadmin:
    image: dpage/pgadmin4
    container_name: reed_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@reed.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [reed-net]

  # ---- Optional: identity provider for the secured (token) path ----
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: reed_keycloak
    profiles: ["secured"]
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./realm/reed-realm.json:/opt/keycloak/data/import/reed-realm.json:ro
    ports:
      - "8080:8080"
    networks: [reed-net]

volumes:
  reed_pg_data:

networks:
  reed-net:
    name: reed-net
