#
# REED Dataspace - Participant: REED-OEM (data consumer)
# This is the OEM that discovers supplier data and requests contract-bound access.
# See reed-supplier.yml for notes on the learning-mode auth model.

hostname: "http://localhost:9001"
bpn: "BPNLREEDOEM00001"

authorization:
  enabled: false
  api_key:
    key: "X-Api-Key"
    value: "reed-oem-key"
  keycloak:
    enabled: false
    auth_url: "http://localhost:8080"
    realm: "REED"
    client_id: "reed-oem-api"
    client_secret: "reed-oem-secret"
    retry:
      max_retries: 1
      retry_delay: 2
      background_retry_interval: 60

agreements: []

database:
  connection_string: "postgresql://reed:reed@localhost:5433/reed_oem"
  echo: false

cors:
  enabled: true
  allow_origins:
    - "http://localhost:5173"
    - "http://localhost:5174"
  allow_credentials: true
  allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
  allow_headers: ["*"]

consumer:
  discovery:
    discovery_finder:
      url: "http://localhost:8082/api/v1.0/administration/connectors/discovery/search"
    connector_discovery:
      key: "bpn"
    oauth:
      url: "http://localhost:8080/auth/"
      realm: "REED"
      client_id: "reed-oem-api"
      client_secret: "reed-oem-secret"
    digitalTwinRegistry:
      dct_type_key: "dct:type"
      dct_type_filter:
        operandLeft: "'http://purl.org/dc/terms/type'.'@id'"
        operator: "="
        operandRight: "https://w3id.org/catenax/taxonomy#DigitalTwinRegistry"
  connector:
    dataspace:
      version: "saturn"
    controlplane:
      hostname: "http://localhost:8093"
      apiKeyHeader: "X-Api-Key"
      apiKey: "reed-edc-key"
      managementPath: "/management"
      protocolPath: "/api/v1/dsp"
      catalogPath: "/catalog"

provider:
  connector:
    dataspace:
      version: "saturn"
    controlplane:
      hostname: "http://localhost:8093"
      apiKeyHeader: "X-Api-Key"
      apiKey: "reed-edc-key"
      managementPath: "/management"
      protocolPath: "/api/v1/dsp"
    dataplane:
      hostname: "http://localhost:8094"
      publicPath: "/api/public"
  digitalTwinRegistry:
    hostname: "http://localhost:8095"
    apiPath: "/api/v3"
    uri: ""
    asset_config:
      dct_type: "https://w3id.org/catenax/taxonomy#DigitalTwinRegistry"
    lookup:
      uri: ""
  submodel_dispatcher:
    mode: "filesystem"
    path: "reed-oem/data/submodels"
    apiPath: "/submodel-dispatcher"
